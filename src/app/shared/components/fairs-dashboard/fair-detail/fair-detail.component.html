<div class="fair">
  <figure class="banner"
  [ngStyle]="{
    'background-image': 'linear-gradient(0deg,#000 10%, transparent), url(' +fairObj.bannerUrl+ ')'
  }"
  >
    
    <figcaption>
      <h2 class="m-0">{{ fairObj.fairName }}</h2>
      <div class="typeAndDate">
        <p class="m-0">Event Type : {{ fairObj.type }}</p>
        <p class="m-0">Date : {{ fairObj.startDate * 1000 | date }}</p>
      </div>
    </figcaption>
  </figure>
  <div class="p-4">
    <p [innerHTML]="fairObj.candidateDescription">
      {{ fairObj.candidateDescription }}
    </p>
    <p [innerHTML]="fairObj.schoolDescription">
      {{ fairObj.schoolDescription }}
    </p>
  </div>
</div>
