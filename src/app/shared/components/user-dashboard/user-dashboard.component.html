
<div class="row">
    <div class="col-12 text-right mb-4">
        <button
        routerLink="addUser"
         mat-raised-button color="primary">Add User</button>
    </div>
    <div class="col-md-4">
        <ul class="list-group" *ngIf="userArr.length > 0; else noUsers">
            <li
            [routerLink]="[user.userId]"
            routerLinkActive="active"
            [queryParams]="{ur : user.userRole}"
             class="list-group-item" *ngFor="let user of userArr; trackBy : trackByFun">
                {{user.userName}}
                 <small class="badge"
                [ngClass]="{
                    'badge-success' : user.isActive,
                    'badge-danger' : !user.isActive
                }"
                >{{user.isActive ? 'Yes': 'No'}}</small>
                {{user.userId}}
            </li>
        </ul>
        <ng-template #noUsers>
            <p class="alert alert-info">
                No Users !!!
            </p>
        </ng-template>
    </div>
    <div class="col-md-8">
    <router-outlet></router-outlet>
    </div>
</div>
